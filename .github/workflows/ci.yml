name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run test:git
      - run: npm run test:github
      - run: xvfb-run -a npm run test:vscode
